<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#173b5f">
    <title>Đang ngoại tuyến · Gia Phả</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, system-ui, sans-serif; background: #f8fafc; color: #173b5f; }
      body { display: grid; min-height: 100vh; margin: 0; place-items: center; padding: 24px; box-sizing: border-box; }
      main { width: min(100%, 480px); border: 1px solid #dbe4ec; border-radius: 24px; padding: 36px; background: rgba(255,255,255,.86); box-shadow: 0 20px 60px rgba(23,59,95,.12); text-align: center; }
      .mark { display: grid; width: 64px; height: 64px; margin: 0 auto 22px; place-items: center; border-radius: 18px; background: #173b5f; color: #f5d58b; font-size: 30px; }
      h1 { margin: 0 0 12px; font-size: 1.45rem; } p { margin: 0; color: #587086; line-height: 1.6; }
      @media (prefers-color-scheme: dark) { :root { background: #0c1d2d; color: #f8fafc; } main { border-color: #25445d; background: #142a3c; } p { color: #b6c8d6; } }
    </style>
  </head>
  <body><main><div class="mark" aria-hidden="true">⌁</div><h1>Bạn đang ngoại tuyến</h1><p>Những dữ liệu đã xem vẫn có thể sử dụng. Kết nối lại để đồng bộ các thay đổi mới nhất.</p></main></body>
</html>
